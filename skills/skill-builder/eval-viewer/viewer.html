<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Review</title>
  <link rel="stylesheet" href="../assets/bootstrap.min.css">
  <!-- SheetJS is optional: if it fails to load (e.g. offline), xlsx outputs fall back to a download link. -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"
          integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT"
          crossorigin="anonymous"></script>
  <style>
    /* ════ D2 · Review Workbench — custom CSS only where Bootstrap has no equivalent ════ */

    /* ── Layout shell ── */
    .app-shell   { height: 100vh; height: 100dvh; }
    .scroll-pane { overflow-y: auto; min-height: 0; }
    .output-text { white-space: pre-wrap; word-break: break-word; }
    .pdf-frame   { height: 70vh; }
    .skill-name  { max-width: 22ch; }
    .read-col    { max-width: 780px; }
    .label-flex  { flex: 1 1 0; min-width: 0; }

    /* Shared typographic token: tiny uppercase section label. Replaces the old
       kicker / brand-eyebrow / sidebar-group-header / stat-label / sec-title /
       vs-tag rules — one source of truth, spacing/color via Bootstrap utilities. */
    .eyebrow { font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; color: var(--bs-secondary-color); }

    /* ── Navbar: segmented tab control (no 1:1 Bootstrap component) ── */
    .seg-tabs { background: var(--bs-tertiary-bg); border-radius: 999px; padding: 3px; }
    .seg-tabs .nav-link { border-radius: 999px; padding: .28rem .9rem; font-size: .85rem; color: var(--bs-secondary-color); border: 0; }
    .seg-tabs .nav-link.active { background: var(--bs-body-bg); color: var(--bs-body-emphasis); box-shadow: var(--bs-box-shadow-sm); }
    .progress-meter { width: 132px; }

    /* ── Nav rail: grouped eval list (static on lg+, offcanvas below) ── */
    .nav-rail { width: 244px; }
    @media (min-width: 992px) { .nav-rail { flex: 0 0 244px; border-right: 1px solid var(--bs-border-color); } }
    #eval-list .list-group-item-action {
      border: 0; border-left: 3px solid transparent; background: transparent;
      color: var(--bs-body-color); padding: .5rem .85rem .5rem .6rem;
    }
    #eval-list .list-group-item-action:hover { background: var(--bs-secondary-bg); }
    #eval-list .list-group-item-action.active { background: var(--bs-secondary-bg); color: var(--bs-body-emphasis); border-left-color: var(--bs-primary); }
    #eval-list .list-group-item-action.active.is-baseline { border-left-color: var(--bs-warning); }
    .run-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .run-dot.v-good { background: var(--bs-success); }
    .run-dot.v-bad  { background: var(--bs-danger); }
    .run-dot.v-none { border: 1.5px solid var(--bs-secondary-color); }

    /* ── Output files: collapsed long code ── */
    .output-collapsed { max-height: 16rem; overflow: hidden; }

    /* ── Feedback rail (static on xl+, offcanvas below) ── */
    .fb-rail { width: 344px; }
    @media (min-width: 1200px) { .fb-rail { flex: 0 0 344px; border-left: 1px solid var(--bs-border-color); } }
    .fb-rail .offcanvas-body { display: block; }
    .save-status { min-height: 1.1rem; }

    /* ── Benchmark: versus scorecards (2-up grid + subtle config tints) ── */
    .vs-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .vs-col.is-with    { background: var(--bs-primary-bg-subtle); }
    .vs-col.is-without { background: var(--bs-warning-bg-subtle); }
    @media (min-width: 576px) { .vs-col.is-with { border-right: 1px solid var(--bs-border-color); } }
  </style>
</head>
<body class="d-flex flex-column app-shell">

  <!-- ============ Navbar: brand · tabs · progress · submit ============ -->
  <nav class="navbar bg-body-tertiary border-bottom flex-shrink-0 py-0">
    <div class="container-fluid" style="min-height:58px">
    <div class="d-flex align-items-center gap-2 me-auto">
      <button class="btn btn-sm btn-link text-body p-1 d-lg-none" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-label="Toggle eval list">
        <span aria-hidden="true" style="font-size:1.1rem">&#9776;</span>
      </button>
      <div class="lh-1">
        <div class="eyebrow mb-1">Skill review</div>
        <span id="skill-name" class="fw-semibold text-body-emphasis text-truncate skill-name d-inline-block align-bottom" title=""></span>
      </div>
    </div>
    <ul class="nav seg-tabs d-none mx-2" id="view-tabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" type="button" role="tab" data-bs-toggle="tab" data-bs-target="#panel-outputs" aria-selected="true" aria-label="Outputs">Outputs</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" type="button" role="tab" data-bs-toggle="tab" data-bs-target="#panel-benchmark" aria-selected="false">Benchmark</button>
      </li>
    </ul>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <div class="progress-meter d-none d-sm-block">
        <div class="d-flex justify-content-between small text-secondary mb-1"><span>Reviewed</span><span id="reviewed-count" class="text-body-emphasis fw-semibold">0 / 0</span></div>
        <div class="progress" role="progressbar" style="height:5px"
             aria-label="Review progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-bar" class="progress-bar bg-success"></div>
        </div>
      </div>
      <button class="btn btn-outline-secondary btn-sm d-xl-none" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#feedback-rail" aria-label="Open review panel">Review</button>
      <button class="btn btn-outline-secondary btn-sm" id="submit-btn" type="button" data-action="submit">Submit All</button>
    </div>
    </div>
  </nav>

  <!-- ============ Tab content ============ -->
  <main class="tab-content flex-grow-1 overflow-hidden">

    <!-- ---- Outputs panel (qualitative review) — three-column workbench ---- -->
    <div class="tab-pane fade show active h-100" id="panel-outputs">
      <div class="d-flex h-100 overflow-hidden">

        <!-- Nav rail: grouped eval list (static on lg+, offcanvas below) -->
        <aside class="nav-rail offcanvas-start d-flex flex-column" id="sidebar"
               tabindex="-1" aria-labelledby="sidebar-title">
          <div class="offcanvas-header border-bottom">
            <h6 class="offcanvas-title mb-0" id="sidebar-title">Evals</h6>
            <button class="btn-close" type="button" data-bs-dismiss="offcanvas"
                    data-bs-target="#sidebar" aria-label="Close eval list"></button>
          </div>
          <div class="offcanvas-body p-0 scroll-pane flex-grow-1 bg-body-tertiary">
            <div id="eval-list" class="list-group list-group-flush"></div>
          </div>
        </aside>

        <!-- Reading column -->
        <div class="d-flex flex-column flex-grow-1 overflow-hidden">
          <div class="border-bottom d-flex align-items-center gap-2 px-3 py-2 flex-shrink-0">
            <button id="prev-btn" class="btn btn-sm btn-outline-secondary" type="button"
                    aria-label="Previous eval">&#8592;</button>
            <button id="next-btn" class="btn btn-sm btn-outline-secondary" type="button"
                    aria-label="Next eval">&#8594;</button>
            <span id="current-config-label" class="fw-semibold text-body-emphasis text-truncate ms-1 label-flex"></span>
            <span id="config-badge" class="badge d-none"></span>
            <span class="small text-secondary opacity-50 ms-auto d-none d-lg-inline" aria-hidden="true">Navigate with ← →</span>
          </div>

          <div id="main-scroll" class="scroll-pane flex-grow-1">

            <!-- Empty state -->
            <div id="no-eval-state" class="h-100 d-flex align-items-center justify-content-center">
              <span class="text-secondary small fst-italic">No eval selected</span>
            </div>

            <!-- Eval content -->
            <div id="eval-content" class="d-none py-4 px-3">
              <div class="read-col mx-auto">

                <!-- Prompt -->
                <div class="eyebrow mb-2">Prompt</div>
                <div id="prompt-text" class="output-text small mb-4 border-start border-3 border-primary ps-3 py-1 lh-base"></div>

                <!-- Output files -->
                <div class="eyebrow mb-2">Output</div>
                <div id="outputs-body"></div>

                <!-- Collapsible extras -->
                <div class="accordion accordion-flush mt-3" id="extras-accordion">
                  <div class="accordion-item d-none" id="prev-outputs-item">
                    <h2 class="accordion-header">
                      <button class="accordion-button collapsed" type="button"
                              data-bs-toggle="collapse" data-bs-target="#prev-outputs-collapse"
                              aria-expanded="false" aria-controls="prev-outputs-collapse">
                        Previous Output
                      </button>
                    </h2>
                    <div id="prev-outputs-collapse" class="accordion-collapse collapse">
                      <div class="accordion-body" id="prev-outputs-body"></div>
                    </div>
                  </div>
                  <div class="accordion-item d-none" id="grades-item">
                    <h2 class="accordion-header">
                      <button class="accordion-button collapsed gap-3" type="button"
                              data-bs-toggle="collapse" data-bs-target="#grades-collapse"
                              aria-expanded="false" aria-controls="grades-collapse">
                        <span>Formal Grades</span>
                        <span id="grades-badge" class="badge"></span>
                      </button>
                    </h2>
                    <div id="grades-collapse" class="accordion-collapse collapse">
                      <div class="accordion-body">
                        <div class="progress mb-2" role="progressbar" aria-label="Grade pass rate"
                             aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                          <div id="grades-progress" class="progress-bar"></div>
                        </div>
                        <p id="grades-summary" class="small text-secondary mb-2"></p>
                        <div id="grades-list" class="list-group list-group-flush"></div>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div><!-- /#eval-content -->
          </div>
        </div>

        <!-- Feedback rail (static on xl+, offcanvas-end below) -->
        <aside class="fb-rail offcanvas-xl offcanvas-end" id="feedback-rail"
               tabindex="-1" aria-labelledby="fb-rail-title">
          <div class="offcanvas-header border-bottom d-xl-none">
            <h6 class="offcanvas-title mb-0" id="fb-rail-title">Your Review</h6>
            <button class="btn-close" type="button" data-bs-dismiss="offcanvas"
                    data-bs-target="#feedback-rail" aria-label="Close review panel"></button>
          </div>
          <div class="offcanvas-body scroll-pane p-3 bg-body-tertiary">
            <div class="d-flex align-items-center justify-content-between mb-3 d-none d-xl-flex">
              <span class="fw-semibold text-body-emphasis">Your Review</span>
              <span id="rail-grade-badge" class="badge rounded-pill d-none"></span>
            </div>
            <div id="rail-note" class="bg-body-secondary rounded small p-2 mb-3 text-secondary">Select an eval to review.</div>

            <div class="eyebrow mb-2">Verdict</div>
            <div class="d-grid gap-2 verdict-stack mb-3" role="group" aria-label="Verdict">
              <input type="radio" class="btn-check" name="verdict" id="verdict-good" value="good" autocomplete="off">
              <label class="btn btn-outline-success text-start" for="verdict-good">👍 Looks good</label>
              <input type="radio" class="btn-check" name="verdict" id="verdict-needs_work" value="needs_work" autocomplete="off">
              <label class="btn btn-outline-danger text-start" for="verdict-needs_work">👎 Needs work</label>
              <input type="radio" class="btn-check" name="verdict" id="verdict-skip" value="skip" autocomplete="off">
              <label class="btn btn-outline-secondary text-start" for="verdict-skip">⏭ Skip for now</label>
            </div>

            <div class="eyebrow mb-2">Notes</div>
            <textarea id="feedback" class="form-control mb-1" rows="6"
              placeholder="What worked, what didn't… (optional)" aria-describedby="feedback-status"></textarea>
            <div id="feedback-status" class="save-status small text-secondary mb-3" aria-live="polite"></div>

            <div id="prev-feedback" class="p-2 ps-3 d-none border-start border-3 border-primary bg-body-secondary rounded-end">
              <div class="eyebrow mb-1">Previous feedback</div>
              <div id="prev-feedback-text" class="small"></div>
            </div>
          </div>
        </aside>

      </div>
    </div>

    <!-- ---- Benchmark panel (quantitative stats) ---- -->
    <div class="tab-pane fade h-100" id="panel-benchmark">
      <div class="scroll-pane h-100">
        <div id="benchmark-content" class="p-4 mx-auto" style="max-width:1100px"></div>
      </div>
    </div>
  </main>

  <!-- ============ Done modal ============ -->
  <div class="modal fade" id="done-modal" tabindex="-1" aria-labelledby="done-modal-title" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="done-modal-title">Review Complete</h5>
          <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">Your feedback has been saved. Go back to your Claude Code session and tell Claude you're done reviewing.</div>
        <div class="modal-footer">
          <button class="btn btn-primary" type="button" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ Toast ============ -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="save-toast" class="toast align-items-center text-bg-success border-0" role="status"
         aria-live="polite" aria-atomic="true">
      <div class="toast-body">Saved</div>
    </div>
  </div>

  <script src="../assets/bootstrap.bundle.min.js"></script>
  <script>
  (() => {
    "use strict";

    /*__EMBEDDED_DATA__*/

    // ===================== (1) Data access =====================
    const DATA = (typeof EMBEDDED_DATA !== "undefined") ? EMBEDDED_DATA : { skill_name: "", runs: [] };
    const RUNS = DATA.runs || [];
    const PREV_FB = DATA.previous_feedback || {};
    const PREV_OUT = DATA.previous_outputs || {};

    // ===================== (2) DOM builder + utils =====================
    // el(tag, attrs, children): attrs supports class, text (textContent, safe),
    // html (innerHTML — only for trusted SheetJS markup), on<event> handlers, and
    // any other key as an attribute. Children may be nodes or strings.
    function el(tag, attrs = {}, children = []) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (v == null) continue;
        if (k === "class") node.className = v;
        else if (k === "text") node.textContent = v;
        else if (k === "html") node.innerHTML = v;
        else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, v);
      }
      for (const c of [].concat(children)) {
        if (c == null) continue;
        node.append(c.nodeType ? c : document.createTextNode(c));
      }
      return node;
    }
    const $ = (id) => document.getElementById(id);

    function detectConfig(id) {
      const m = (id || "").match(/(with_skill|without_skill|new_skill|old_skill)/);
      if (!m) return null;
      const config = m[1];
      return {
        config,
        label: config.replace(/_/g, " "),
        baseline: config === "without_skill" || config === "old_skill",
      };
    }
    function downloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content || "");
      if (file.type === "html") return "data:text/html;charset=utf-8," + encodeURIComponent(file.content || "");
      if (file.type === "image_url") return file.src;
      return "#";
    }
    function titleCase(s) {
      return (s || "").replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
    }
    function evalTitle(run) {
      return run.eval_id != null ? `Eval ${run.eval_id}` : run.id;
    }
    function gradePct(run) {
      const s = run.grading && run.grading.summary;
      return (s && s.pass_rate != null) ? Math.round(s.pass_rate * 100) : null;
    }

    // ===================== (3) Copy helper =====================
    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = "Copied!";
        btn.classList.replace("btn-outline-secondary", "btn-success");
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.replace("btn-success", "btn-outline-secondary");
          btn.classList.remove("copied");
        }, 1800);
      }).catch(() => {
        const orig = btn.textContent;
        btn.textContent = "Failed";
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    // ===================== (4) Sidebar =====================
    function buildSidebar() {
      const list = $("eval-list");
      list.replaceChildren();

      // Group by eval_id when multiple runs share the same eval_id
      const grouped = RUNS.some(
        (r, i) => r.eval_id != null && RUNS.findIndex((x) => x.eval_id === r.eval_id) !== i
      );

      if (grouped) {
        const groups = new Map();
        RUNS.forEach((run, i) => {
          const gid = run.eval_id != null ? run.eval_id : "_";
          if (!groups.has(gid)) groups.set(gid, []);
          groups.get(gid).push({ run, i });
        });
        let first = true;
        for (const [gid, items] of groups) {
          list.append(el("div", {
            class: "eyebrow px-3 pb-1 user-select-none " + (first ? "pt-2" : "pt-3"),
            text: gid === "_" ? "Other" : `Eval ${gid}`,
          }));
          first = false;
          items.forEach(({ run, i }) => list.append(makeSidebarItem(run, i, true)));
        }
      } else {
        RUNS.forEach((run, i) => list.append(makeSidebarItem(run, i, false)));
      }
    }

    function verdictDotClass(runId) {
      const v = verdictMap[runId];
      return v === "good" ? "v-good" : v === "needs_work" ? "v-bad" : "v-none";
    }

    function makeSidebarItem(run, i, isChild) {
      const cfg = detectConfig(run.id);
      const pct = gradePct(run);
      // In grouped mode the config name IS the label; in flat mode show "Eval N [· config]"
      const labelText = isChild ? (cfg ? cfg.label : evalTitle(run)) : evalTitle(run);
      const dot = el("span", {
        class: "run-dot " + verdictDotClass(run.id),
        "data-dot": run.id,
        title: "Your review state",
      });
      const badges = el("span", { class: "d-flex align-items-center gap-1 flex-shrink-0 ms-auto" }, [
        !isChild && cfg ? el("span", {
          class: "badge rounded-pill " + (cfg.baseline ? "text-bg-warning" : "text-bg-primary"),
          text: cfg.label,
        }) : null,
        pct == null ? null : el("span", {
          class: "badge rounded-pill " + (pct >= 80 ? "text-bg-success" : "text-bg-danger"),
          text: pct + "%",
        }),
      ]);
      return el("button", {
        class: "list-group-item list-group-item-action d-flex align-items-center gap-2" + (cfg && cfg.baseline ? " is-baseline" : ""),
        type: "button",
        "data-index": String(i),
        onclick: () => { clearTimeout(saveTimer); saveFeedback(false); showRun(i); closeSidebarOnMobile(); },
      }, [dot, el("span", { class: "text-truncate small flex-grow-1", text: labelText }), badges]);
    }

    function setActiveSidebar(i) {
      $("eval-list").querySelectorAll("[data-index]").forEach((b) => {
        const active = +b.dataset.index === i;
        b.classList.toggle("active", active);
        b.setAttribute("aria-current", active ? "true" : "false");
        if (active) b.scrollIntoView({ block: "nearest" });
      });
    }
    function closeSidebarOnMobile() {
      const inst = window.bootstrap && bootstrap.Offcanvas.getInstance($("sidebar"));
      if (inst) inst.hide();
    }

    // ===================== (5) Eval detail =====================
    function showRun(index) {
      const run = RUNS[index];
      if (!run) return;
      currentIndex = index;
      setActiveSidebar(index);

      $("no-eval-state").classList.add("d-none");
      const content = $("eval-content");
      content.classList.remove("d-none");

      const cfg = detectConfig(run.id);
      $("current-config-label").textContent = evalTitle(run) + (cfg ? " · " + cfg.label : "");
      $("prompt-text").textContent = run.prompt || "(No prompt found)";

      const badge = $("config-badge");
      if (cfg) {
        badge.className = "badge rounded-pill " + (cfg.baseline ? "text-bg-warning" : "text-bg-primary");
        badge.textContent = cfg.label;
      } else {
        badge.className = "badge d-none";
        badge.textContent = "";
      }

      renderOutputs($("outputs-body"), run.outputs || []);
      renderPrevOutputs(run);
      renderGrades(run);
      renderPrevFeedback(run);

      // Feedback rail: context line + grade-at-a-glance
      $("rail-note").replaceChildren(
        document.createTextNode("Reviewing "),
        el("strong", { class: "text-body-emphasis", text: evalTitle(run) + (cfg ? " · " + cfg.label : "") }),
        document.createTextNode(". Your verdict and notes save automatically.")
      );
      const pct = gradePct(run);
      const rgb = $("rail-grade-badge");
      if (pct == null) { rgb.className = "badge rounded-pill d-none"; rgb.textContent = ""; }
      else {
        rgb.className = "badge rounded-pill " + (pct >= 80 ? "text-bg-success" : pct >= 50 ? "text-bg-warning" : "text-bg-danger");
        rgb.textContent = "Grade " + pct + "%";
      }

      // Restore saved verdict for this run
      const v = verdictMap[run.id] || "";
      ["good", "needs_work", "skip"].forEach((k) => {
        const r = $("verdict-" + k);
        if (r) r.checked = (k === v);
      });

      $("feedback").value = feedbackMap[run.id] || "";
      $("feedback-status").textContent = "";

      visited.add(index);
      updateNav();
      $("main-scroll").scrollTop = 0;
    }

    // ===================== (6) File rendering =====================

    // Populates `container` with the rendered file content (no card wrapper).
    function buildFileContentInto(container, file) {
      if (file.type === "image_url") {
        const imgWrap = el("div", { class: "bg-body-secondary rounded p-2" });
        const thumb = el("img", { alt: file.name, class: "img-fluid d-block", style: "max-height:260px;object-fit:contain;" });
        thumb.src = file.src;
        imgWrap.append(
          thumb,
          el("a", { href: file.src, target: "_blank", rel: "noopener noreferrer", class: "small mt-2 d-inline-block", text: "Open full size ↗" })
        );
        container.append(imgWrap);
      } else if (file.type === "html") {
        const frame = el("iframe", { class: "pdf-frame w-100 border-0", sandbox: "allow-scripts" });
        frame.srcdoc = file.content;
        container.append(frame);
      } else if (file.type === "text") {
        const lines = (file.content || "").split("\n").length;
        const pre = el("pre", { class: "output-text mb-0 bg-body-tertiary border rounded p-3 small lh-base overflow-auto", text: file.content });
        const wrap = el("div", { class: "code-block-wrap position-relative" });
        const copyBtn = el("button", {
          class: "btn btn-outline-secondary btn-sm position-absolute top-0 end-0 m-2",
          type: "button",
          text: "Copy",
          onclick: (e) => copyText(file.content, e.currentTarget),
        });
        if (lines > 30) {
          pre.classList.add("output-collapsed");
          const expandBtn = el("button", {
            class: "btn btn-link small d-block w-100 text-center py-1 mt-1",
            type: "button",
            text: `▼ Show all ${lines} lines`,
            onclick: (e) => { pre.classList.remove("output-collapsed"); e.currentTarget.remove(); },
          });
          wrap.append(copyBtn, pre, expandBtn);
        } else {
          wrap.append(copyBtn, pre);
        }
        container.append(wrap);
      } else if (file.type === "image") {
        container.append(el("img", { class: "img-fluid", src: file.data_uri, alt: file.name }));
      } else if (file.type === "pdf") {
        container.append(el("iframe", { class: "pdf-frame w-100 border-0", src: file.data_uri }));
      } else if (file.type === "xlsx") {
        renderXlsx(container, file);
      } else if (file.type === "binary") {
        container.append(el("a", { class: "btn btn-outline-secondary", href: file.data_uri, download: file.name, text: "Download " + file.name }));
      } else if (file.type === "error") {
        container.append(el("pre", { class: "output-text text-danger mb-0", text: file.content }));
      }
    }

    function fileCard(file) {
      const body = el("div", { class: "card-body" });
      buildFileContentInto(body, file);
      const header = el("div", { class: "card-header d-flex justify-content-between align-items-center" }, [
        el("span", { class: "font-monospace small", text: file.name }),
        el("a", { class: "small", href: downloadUri(file), download: file.name, text: "Download" }),
      ]);
      return el("div", { class: "card rounded-0 mb-3" }, [header, body]);
    }

    function renderOutputs(container, outputs) {
      container.replaceChildren();
      if (!outputs.length) {
        container.append(el("div", { class: "text-muted fst-italic p-3 text-center", text: "No output files" }));
        return;
      }

      // Single file: plain card (no tabs overhead)
      if (outputs.length === 1) {
        container.append(fileCard(outputs[0]));
        return;
      }

      // Multiple files: Bootstrap tab strip so long outputs don't stack
      const uid = "ft-" + Math.random().toString(36).slice(2);
      const tabList = el("ul", { class: "nav nav-tabs mt-3 flex-wrap", role: "tablist" });
      const tabContent = el("div", { class: "tab-content border border-top-0" });

      outputs.forEach((f, i) => {
        const tid = uid + i;
        const active = i === 0;
        const tabBtn = el("button", {
          class: "nav-link d-flex align-items-center gap-2" + (active ? " active" : ""),
          type: "button",
          role: "tab",
          "data-bs-toggle": "tab",
          "data-bs-target": "#" + tid,
          "aria-selected": String(active),
          title: f.name,
        }, [
          el("span", { class: "font-monospace small", text: f.name }),
          el("a", {
            class: "badge bg-secondary bg-opacity-75 text-decoration-none ms-1",
            href: downloadUri(f),
            download: f.name,
            text: "↓",
            title: "Download",
            onclick: (e) => e.stopPropagation(),
          }),
        ]);
        tabList.append(el("li", { class: "nav-item", role: "presentation" }, [tabBtn]));

        const pane = el("div", {
          id: tid,
          class: "tab-pane fade p-3" + (active ? " show active" : ""),
          role: "tabpanel",
        });
        buildFileContentInto(pane, f);
        tabContent.append(pane);
      });

      container.append(tabList, tabContent);
    }

    function renderXlsx(container, file) {
      if (typeof XLSX === "undefined") {
        container.append(el("a", {
          class: "btn btn-outline-secondary",
          href: downloadUri(file), download: file.name,
          text: "Download " + file.name + " (spreadsheet preview unavailable offline)",
        }));
        return;
      }
      try {
        const raw = Uint8Array.from(atob(file.data_b64), (c) => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });
        wb.SheetNames.forEach((name) => {
          if (wb.SheetNames.length > 1) {
            container.append(el("div", { class: "fw-semibold small text-secondary mt-2", text: "Sheet: " + name }));
          }
          const wrap = el("div", { class: "table-responsive", html: XLSX.utils.sheet_to_html(wb.Sheets[name]) });
          wrap.querySelectorAll("table").forEach((t) => t.classList.add("table", "table-sm", "table-bordered"));
          container.append(wrap);
        });
      } catch (err) {
        container.append(el("div", { class: "text-danger", text: "Error rendering spreadsheet: " + err.message }));
      }
    }

    function renderPrevOutputs(run) {
      const item = $("prev-outputs-item");
      const body = $("prev-outputs-body");
      const prev = PREV_OUT[run.id];
      if (!prev || !prev.length) { item.classList.add("d-none"); return; }
      item.classList.remove("d-none");
      body.replaceChildren();
      prev.forEach((f) => body.append(fileCard(f)));
    }

    function renderGrades(run) {
      const item = $("grades-item");
      if (!run.grading) { item.classList.add("d-none"); return; }
      item.classList.remove("d-none");

      const g = run.grading, s = g.summary || {}, exps = g.expectations || [];
      const pct = s.pass_rate != null ? Math.round(s.pass_rate * 100) : null;
      const badgeCls = pct == null ? "text-bg-secondary" : pct >= 80 ? "text-bg-success" : pct >= 50 ? "text-bg-warning" : "text-bg-danger";
      const barCls = pct == null ? "bg-secondary" : pct >= 80 ? "bg-success" : pct >= 50 ? "bg-warning" : "bg-danger";

      const badge = $("grades-badge");
      badge.className = "badge rounded-pill " + badgeCls;
      badge.textContent = pct == null ? "?" : pct + "%";

      const bar = $("grades-progress");
      const progressPct = pct == null ? 0 : pct;
      bar.style.width = progressPct + "%";
      bar.textContent = pct == null ? "" : pct + "%";
      bar.className = "progress-bar " + barCls;
      bar.closest("[role='progressbar']").setAttribute("aria-valuenow", progressPct);

      $("grades-summary").textContent = `${s.passed || 0} passed, ${s.failed || 0} failed of ${s.total || 0}`;

      const list = $("grades-list");
      list.replaceChildren();
      exps.forEach((e) => {
        list.append(el("div", { class: "list-group-item" }, [
          el("span", { class: "fw-bold me-2 " + (e.passed ? "text-success" : "text-danger"), text: e.passed ? "✓" : "✗" }),
          el("span", { text: e.text }),
          e.evidence ? el("div", { class: "text-muted small mt-1 ms-4", text: e.evidence }) : null,
        ]));
      });
    }

    function renderPrevFeedback(run) {
      const box = $("prev-feedback");
      const txt = PREV_FB[run.id];
      if (txt) {
        $("prev-feedback-text").textContent = txt;
        box.classList.remove("d-none");
      } else {
        box.classList.add("d-none");
      }
    }

    // ===================== (7) Benchmark =====================
    function fmtStat(stat, pct) {
      if (!stat || stat.mean == null || stat.stddev == null) return "—";
      const u = pct ? "%" : "";
      const m = pct ? (stat.mean * 100).toFixed(0) : stat.mean.toFixed(1);
      const sd = pct ? (stat.stddev * 100).toFixed(0) : stat.stddev.toFixed(1);
      return `${m}${u} ± ${sd}${u}`;
    }
    function deltaClass(v) {
      const n = parseFloat(v);
      if (!v || isNaN(n)) return "";
      return n > 0 ? "text-success fw-bold" : n < 0 ? "text-danger fw-bold" : "";
    }
    function rowClassFor(cfg) {
      return (cfg === "without_skill" || cfg === "old_skill") ? "table-warning" : "table-primary";
    }
    // Format a raw proportion delta as percentage-points string, e.g. 0.74 → "+74pp"
    function fmtDeltaPp(v) {
      if (v == null) return "—";
      const n = parseFloat(v);
      if (isNaN(n)) return String(v);
      const pp = Math.round(n * 100);
      return (n > 0 ? "+" : "") + pp + "pp";
    }

    function renderBenchmark() {
      const d = DATA.benchmark;
      if (!d) return;
      const c = $("benchmark-content");
      c.replaceChildren();

      const summary = d.run_summary || {}, meta = d.metadata || {}, notes = d.notes || [];
      c.append(el("h2", { class: "h4 mb-1", text: "Benchmark Results" }));
      const metaBits = [
        meta.skill_name, meta.timestamp,
        meta.evals_run ? "Evals: " + meta.evals_run.join(", ") : null,
        (meta.runs_per_configuration || "?") + " runs/config",
      ].filter(Boolean).join("  —  ");
      c.append(el("p", { class: "text-secondary small mb-3", text: metaBits }));

      const configs = Object.keys(summary).filter((k) => k !== "delta");
      const ca = configs[0], cb = configs[1];
      const a = summary[ca] || {}, b = summary[cb] || {}, delta = summary.delta || {};

      // ── Stat hero cards (visual summary) ──
      const heroRow = el("div", { class: "row g-3 mb-4" });

      function makeStatCard(valueEl, label, contextText, highlightClass) {
        return el("div", { class: "col-sm-6 col-lg-4" }, [
          el("div", { class: "card bg-body-tertiary h-100 " + (highlightClass || "") }, [
            el("div", { class: "card-body text-center py-4" }, [
              valueEl,
              el("div", { class: "eyebrow mt-2", text: label }),
              contextText ? el("div", { class: "small text-secondary mt-1", text: contextText }) : null,
            ]),
          ]),
        ]);
      }

      // Pass Rate delta
      const prDeltaRaw = delta.pass_rate;
      const prDeltaN = prDeltaRaw != null ? parseFloat(prDeltaRaw) : NaN;
      const prA = a.pass_rate?.mean != null ? Math.round(a.pass_rate.mean * 100) + "%" : "—";
      const prB = b.pass_rate?.mean != null ? Math.round(b.pass_rate.mean * 100) + "%" : "—";
      const prValueCls = !isNaN(prDeltaN) ? (prDeltaN > 0 ? "text-success" : prDeltaN < 0 ? "text-danger" : "") : "";
      heroRow.append(makeStatCard(
        el("div", { class: "fs-1 fw-bold lh-1 " + prValueCls, text: fmtDeltaPp(prDeltaRaw) }),
        "Pass Rate Delta",
        ca && cb ? `${titleCase(ca)}: ${prA}  ·  ${titleCase(cb)}: ${prB}` : null,
        !isNaN(prDeltaN) && prDeltaN > 0 ? "border-success border-opacity-50" : ""
      ));

      // Time delta
      if (a.time_seconds || b.time_seconds) {
        const tDeltaRaw = delta.time_seconds;
        const tDeltaN = tDeltaRaw != null ? parseFloat(tDeltaRaw) : NaN;
        const tA = fmtStat(a.time_seconds, false);
        const tB = fmtStat(b.time_seconds, false);
        const tSign = !isNaN(tDeltaN) && tDeltaN > 0 ? "+" : "";
        heroRow.append(makeStatCard(
          el("div", { class: "fs-1 fw-bold lh-1 text-secondary", text: tDeltaRaw != null ? tSign + tDeltaRaw + "s" : "—" }),
          "Time Delta (s)",
          ca && cb ? `${titleCase(ca)}: ${tA}  ·  ${titleCase(cb)}: ${tB}` : null,
          ""
        ));
      }

      // Token delta
      if (a.tokens || b.tokens) {
        const tkDeltaRaw = delta.tokens;
        const tkA = fmtStat(a.tokens, false);
        const tkB = fmtStat(b.tokens, false);
        heroRow.append(makeStatCard(
          el("div", { class: "fs-1 fw-bold lh-1 text-secondary", text: tkDeltaRaw != null ? String(tkDeltaRaw) : "—" }),
          "Token Delta",
          ca && cb ? `${titleCase(ca)}: ${tkA}  ·  ${titleCase(cb)}: ${tkB}` : null,
          ""
        ));
      }

      c.append(heroRow);

      // ── Detail metrics table ──
      const rows = [["Pass Rate", fmtStat(a.pass_rate, true), fmtStat(b.pass_rate, true), delta.pass_rate]];
      if (a.time_seconds || b.time_seconds) {
        rows.push(["Time (s)", fmtStat(a.time_seconds, false), fmtStat(b.time_seconds, false), delta.time_seconds ? delta.time_seconds + "s" : null]);
      }
      if (a.tokens || b.tokens) {
        rows.push(["Tokens", fmtStat(a.tokens, false), fmtStat(b.tokens, false), delta.tokens]);
      }
      const tbody = el("tbody", {}, rows.map((r) => el("tr", {}, [
        el("td", {}, [el("strong", { text: r[0] })]),
        el("td", { text: r[1] }),
        el("td", { text: r[2] }),
        el("td", { class: deltaClass(r[3]), text: r[3] || "—" }),
      ])));
      const summaryWrap = el("div", { class: "table-responsive mb-4" });
      summaryWrap.append(el("table", { class: "table table-striped table-bordered table-hover align-middle" }, [
        el("thead", {}, [el("tr", {}, [
          el("th", { text: "Metric" }),
          el("th", { text: titleCase(ca || "A") }),
          el("th", { text: titleCase(cb || "B") }),
          el("th", { text: "Delta" }),
        ])]),
        tbody,
      ]));
      c.append(summaryWrap);

      renderBenchmarkPerEval(c, d);

      if (notes.length) {
        c.append(el("div", { class: "card mt-2" }, [
          el("div", { class: "card-header fw-semibold", text: "Analysis Notes" }),
          el("div", { class: "card-body" }, [el("ul", { class: "mb-0" }, notes.map((n) => el("li", { text: n })))]),
        ]));
      }
    }

    function isBaselineCfg(cfg) { return cfg === "without_skill" || cfg === "old_skill"; }

    function renderBenchmarkPerEval(c, d) {
      const runs = d.runs || [];
      if (!runs.length) return;
      const evalIds = [...new Set(runs.map((r) => r.eval_id))].sort((x, y) => x - y);

      c.append(el("div", { class: "eyebrow mb-2 mt-4", text: "Per-Eval Breakdown" }));

      evalIds.forEach((id) => {
        const er = runs.filter((r) => r.eval_id === id);
        const name = (er[0] && er[0].eval_name) || ("Eval " + id);
        // Order configs so the skill version leads and the baseline trails.
        const groups = [...new Set(er.map((r) => r.configuration))]
          .sort((a, b) => (isBaselineCfg(a) ? 1 : 0) - (isBaselineCfg(b) ? 1 : 0));
        const runsPer = Math.max(...groups.map((g) => er.filter((r) => r.configuration === g).length), 1);

        const grid = el("div", { class: "vs-grid" });
        groups.forEach((cfg) => {
          const cr = er.filter((r) => r.configuration === cfg);
          const rates = cr.map((r) => (r.result || {}).pass_rate || 0);
          const avg = rates.reduce((s, v) => s + v, 0) / (rates.length || 1);
          const total = (cr[0] && cr[0].result && cr[0].result.total) || 0;
          const passed = cr.length === 1 ? ((cr[0].result || {}).passed || 0) : Math.round(avg * total);
          const times = cr.map((r) => (r.result || {}).time_seconds).filter((t) => t != null);
          const avgTime = times.length ? times.reduce((s, v) => s + v, 0) / times.length : null;
          const pctNum = Math.round(avg * 100);
          const baseline = isBaselineCfg(cfg);
          const bigCls = pctNum >= 80 ? "text-success" : pctNum < 50 ? "text-danger" : "text-warning";
          const metaBits = [`${passed} / ${total} assertions`];
          if (avgTime != null) metaBits.push(`${avgTime.toFixed(1)}s${runsPer > 1 ? " avg" : ""}`);
          grid.append(el("div", { class: "vs-col p-3 " + (baseline ? "is-without" : "is-with") }, [
            el("div", { class: "eyebrow mb-1 " + (baseline ? "text-warning" : "text-info"), text: titleCase(cfg) }),
            el("div", { class: "fs-2 fw-bold lh-1 " + bigCls, text: pctNum + "%" }),
            el("div", { class: "small text-secondary mt-1", text: metaBits.join(" · ") }),
          ]));
        });

        const card = el("div", { class: "border rounded overflow-hidden mb-3" }, [
          el("div", { class: "bg-body-tertiary px-3 py-2 border-bottom d-flex align-items-center justify-content-between" }, [
            el("span", { class: "font-monospace text-body-emphasis", text: name }),
            el("span", { class: "eyebrow", text: runsPer + (runsPer === 1 ? " run/config" : " runs/config") }),
          ]),
          grid,
        ]);
        const matrix = buildAssertionMatrix(er, groups);
        if (matrix) card.append(matrix);
        c.append(card);
      });
    }

    // Returns a table element (assertion × configuration), or null if no expectations.
    function buildAssertionMatrix(evalRuns, groups) {
      const withExp = {};
      groups.forEach((g) => { withExp[g] = evalRuns.filter((r) => r.configuration === g && (r.expectations || []).length); });
      if (!Object.values(withExp).some((a) => a.length)) return null;

      const seen = new Set(), assertions = [];
      groups.forEach((g) => withExp[g].forEach((run) => (run.expectations || []).forEach((e) => {
        if (!seen.has(e.text)) { seen.add(e.text); assertions.push(e.text); }
      })));

      const tbody = el("tbody", {}, assertions.map((text) => el("tr", {}, [
        el("td", { class: "small", text }),
        ...groups.map((g) => {
          const results = withExp[g].map((run) => {
            const e = (run.expectations || []).find((x) => x.text === text);
            return e ? { passed: e.passed, evidence: e.evidence, runNum: run.run_number } : null;
          }).filter(Boolean);

          if (!results.length) return el("td", { class: "text-center text-secondary", text: "—" });

          const allPass = results.every((r) => r.passed);
          const anyFail = results.some((r) => !r.passed);
          const cellCls = allPass ? "table-success text-center" : anyFail ? "table-danger text-center" : "text-center";

          const children = results.flatMap((r, i) => {
            const span = el("span", {
              class: r.passed ? "text-success fw-bold" : "text-danger fw-bold",
              title: `Run ${r.runNum}${r.evidence ? ": " + r.evidence : ""}`,
              text: r.passed ? "✓" : "✗",
            });
            return i > 0 ? [" ", span] : [span];
          });
          return el("td", { class: cellCls }, children);
        }),
      ])));

      const matrixWrap = el("div", { class: "table-responsive" });
      matrixWrap.append(el("table", { class: "table table-sm align-middle mb-0" }, [
        el("thead", {}, [el("tr", {}, [
          el("th", { class: "small text-secondary", text: "Assertion" }),
          ...groups.map((g) => el("th", { class: "text-center small text-secondary", style: "width:120px", text: titleCase(g) })),
        ])]),
        tbody,
      ]));
      return matrixWrap;
    }

    // ===================== (8) State + navigation =====================
    const feedbackMap = {};   // run_id -> feedback text
    const verdictMap = {};    // run_id -> "good" | "needs_work" | "skip"
    const visited = new Set();
    let currentIndex = 0;

    function setVerdict(value) {
      const run = RUNS[currentIndex];
      if (!run) return;
      if (value) verdictMap[run.id] = value; else delete verdictMap[run.id];
      const dot = $("eval-list").querySelector('[data-dot="' + run.id + '"]');
      if (dot) dot.className = "run-dot " + verdictDotClass(run.id);
      updateNav();
      scheduleSave();
    }

    function navigate(delta) {
      const next = currentIndex + delta;
      if (next >= 0 && next < RUNS.length) { clearTimeout(saveTimer); saveFeedback(false); showRun(next); }
    }
    function updateNav() {
      $("prev-btn").disabled = currentIndex === 0;
      $("next-btn").disabled = RUNS.length === 0 || currentIndex === RUNS.length - 1;
      const total = RUNS.length, reviewed = Object.keys(verdictMap).length;
      const pct = total ? Math.round(reviewed / total * 100) : 0;
      const bar = $("progress-bar");
      bar.style.width = pct + "%";
      bar.closest("[role='progressbar']").setAttribute("aria-valuenow", pct);
      const rc = $("reviewed-count");
      if (rc) rc.textContent = `${reviewed} / ${total}`;
      if (total && reviewed >= total) {
        $("submit-btn").classList.remove("btn-outline-secondary");
        $("submit-btn").classList.add("btn-primary");
      }
    }

    // ===================== (9) Feedback persistence =====================
    async function prefillFeedback() {
      // Fresh iteration: the on-disk feedback.json belongs to the prior iteration, so don't prefill from it.
      const fresh = Object.keys(PREV_FB).length > 0 || Object.keys(PREV_OUT).length > 0;
      if (fresh) return;
      try {
        const r = await fetch("/api/feedback");
        const d = await r.json();
        (d.reviews || []).forEach((x) => { feedbackMap[x.run_id] = x.feedback; if (x.verdict) verdictMap[x.run_id] = x.verdict; });
      } catch { /* static mode or first run — nothing to prefill */ }
    }

    let saveTimer = null;
    function scheduleSave() {
      clearTimeout(saveTimer);
      const st = $("feedback-status");
      st.textContent = "Saving…";
      st.className = "save-status small text-secondary mb-3";
      saveTimer = setTimeout(() => saveFeedback(true), 800);
    }
    function saveFeedback(showStatus) {
      const run = RUNS[currentIndex];
      if (!run) return;
      const text = $("feedback").value;
      if (text.trim()) feedbackMap[run.id] = text; else delete feedbackMap[run.id];

      const ids = new Set([...Object.keys(feedbackMap), ...Object.keys(verdictMap)]);
      const reviews = [...ids]
        .map((run_id) => ({ run_id, feedback: feedbackMap[run_id] || "", verdict: verdictMap[run_id] || "", timestamp: new Date().toISOString() }))
        .filter((r) => r.feedback.trim() || r.verdict);

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reviews, status: "in_progress" }),
      }).then(() => {
        if (showStatus) { const st = $("feedback-status"); st.textContent = "✓ Saved"; st.className = "save-status small text-success mb-3"; toast("Saved"); }
      }).catch(() => {
        if (showStatus) { const st = $("feedback-status"); st.textContent = "Will download on submit"; st.className = "save-status small text-secondary mb-3"; }
      });
    }
    function toast(msg) {
      const t = $("save-toast");
      t.querySelector(".toast-body").textContent = msg;
      bootstrap.Toast.getOrCreateInstance(t, { delay: 1500 }).show();
    }

    function submitAll() {
      clearTimeout(saveTimer);
      $("submit-btn").disabled = true;
      const run = RUNS[currentIndex];
      const text = $("feedback").value;
      if (run) { if (text.trim()) feedbackMap[run.id] = text; else delete feedbackMap[run.id]; }

      const ts = new Date().toISOString();
      // Include every run so the model can tell "no feedback" (looks good) from "not reviewed".
      const reviews = RUNS.map((r) => ({ run_id: r.id, feedback: feedbackMap[r.id] || "", verdict: verdictMap[r.id] || "", timestamp: ts }));
      const payload = JSON.stringify({ reviews, status: "complete" }, null, 2);
      const done = () => bootstrap.Modal.getOrCreateInstance($("done-modal")).show();

      fetch("/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
      }).then(done).catch(() => {
        // Static mode (no server) — download the file instead.
        const url = URL.createObjectURL(new Blob([payload], { type: "application/json" }));
        const a = el("a", { href: url, download: "feedback.json" });
        a.click();
        URL.revokeObjectURL(url);
        done();
      });
    }

    // ===================== (10) Events + init =====================
    function onKey(e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); navigate(-1); }
      else if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); navigate(1); }
    }
    function init() {
      const skillNameEl = $("skill-name");
      skillNameEl.textContent = DATA.skill_name || "";
      skillNameEl.title = DATA.skill_name || "";
      buildSidebar();
      $("prev-btn").addEventListener("click", () => navigate(-1));
      $("next-btn").addEventListener("click", () => navigate(1));
      document.querySelectorAll("[data-action='submit']").forEach((b) => b.addEventListener("click", submitAll));
      $("feedback").addEventListener("input", scheduleSave);
      document.querySelectorAll("input[name='verdict']").forEach((r) =>
        r.addEventListener("change", () => setVerdict(r.checked ? r.value : "")));
      document.addEventListener("keydown", onKey);
      if (DATA.benchmark) { $("view-tabs").classList.remove("d-none"); renderBenchmark(); }
      prefillFeedback().then(() => { if (RUNS.length) showRun(0); else updateNav(); });
    }
    document.addEventListener("DOMContentLoaded", init);
  })();
  </script>
</body>
</html>
