name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: npm ci
      - run: pip install pytest

      - name: Check manifest versions match tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for f in package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json; do
            ver=$(node -p "require('./$f').version ?? require('./$f').plugins[0].version")
            if [ "$ver" != "$tag" ]; then
              echo "Version mismatch in $f: expected $tag, found $ver"
              exit 1
            fi
          done

      - run: npm test

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
