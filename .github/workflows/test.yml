name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  node-tests:
    name: Node.js unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run node:test suite
        run: |
          node --test \
            hooks/handlers/explorer.test.mjs \
            hooks/handlers/session.test.mjs \
            hooks/runner.test.mjs \
            skills/architecture/scripts/check-locality.test.mjs \
            skills/architecture/scripts/detect-bleed.test.mjs \
            skills/architecture/scripts/utils/extractor.test.mjs \
            skills/architecture/scripts/utils/graph.test.mjs

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest pyyaml jsonschema

      - name: Run pytest suite
        run: |
          python -m pytest \
            skills/agent-development/scripts/tests/ \
            skills/skill-builder/tests/ \
            -q --tb=short

  dry-run-evals:
    name: Validate eval suites (dry-run)
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Dry-run coder eval suite
        run: |
          python skills/agent-development/scripts/simulate.py \
            agents/coder.md \
            agents/evals/coder-cases.yaml \
            --dry-run --sandbox --report json

      - name: Dry-run explorer eval suite
        run: |
          python skills/agent-development/scripts/simulate.py \
            agents/explorer.md \
            agents/evals/explorer-cases.yaml \
            --dry-run --sandbox --report json
